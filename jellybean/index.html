<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Android Jelly Bean Easter Egg</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            -webkit-user-select: none;
        }

        #logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            cursor: pointer;
            padding: 32px;
            box-sizing: border-box;
        }

        #platlogo {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        #beanbag-board {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: none;
            cursor: pointer;
            touch-action: none; /* スマホのスワイプスクロール防止 */
        }

        /* JELLY BEAN 専用カスタムトースト */
        .jb-toast {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 9999;
        }
        .jb-toast.show {
            opacity: 1;
        }
        .jb-toast-version {
            font-family: sans-serif-light, sans-serif;
            font-size: 22px;
            color: #FFFFFF;
            text-shadow: 0 4px 2px rgba(0,0,0,0.4);
            margin-bottom: -4px;
        }
        .jb-toast-name {
            font-family: sans-serif;
            font-weight: bold;
            font-size: 18px;
            color: #FFFFFF;
            text-shadow: 0 4px 2px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>

    <div id="logo-container">
        <!-- 初期状態は顔なし(alt) -->
        <img id="platlogo" src="j_platlogo_alt.webp" alt="Jelly Bean Logo">
    </div>

    <!-- 宇宙空間のビーンバッグ用キャンバス -->
    <canvas id="beanbag-board"></canvas>

    <div id="toast" class="jb-toast">
        <div id="toast-version" class="jb-toast-version"></div>
        <div class="jb-toast-name">JELLY BEAN</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
