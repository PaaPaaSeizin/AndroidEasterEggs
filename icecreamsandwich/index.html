<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Android Ice Cream Sandwich Easter Egg</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ロゴ表示コンテナ (ScaleType.CENTER_INSIDE 相当) */
        #logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        #platlogo {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            transition: transform 0.1s ease-out; /* スムーズな巨大化用 */
            transform: scale(1);
        }

        /* Nyandroid 宇宙空間キャンバス */
        #nyandroid-board {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #003366; /* Javaの 0xFF003366 */
            display: none; /* 最初は隠しておく */
            cursor: pointer;
        }

        /* AndroidのToast（通知ポップアップ）の再現 */
        .android-toast {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(50, 50, 50, 0.9);
            color: #fff;
            padding: 10px 20px;
            border-radius: 24px;
            font-size: 14px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 9999;
        }
        .android-toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>

    <!-- 第一ステージ：ロゴタップ画面 -->
    <div id="logo-container">
        <img id="platlogo" src="" alt="Android Plat Logo">
    </div>

    <!-- 第二ステージ：裏ゲーム Nyandroid 空間 -->
    <canvas id="nyandroid-board"></canvas>

    <!-- トースト通知 -->
    <div id="toast" class="android-toast"></div>

    <script src="script.js"></script>
</body>
</html>
