<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Android Easter Eggs Portal</title>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #121212;
            color: #fff;
            display: flex;
            flex-direction: column; /* 上下並びにする */
            height: 100vh;
            overflow: hidden;
        }

        /* 上部メニュー（ヘッダー） */
        #header {
            background: #1e1e1e;
            border-bottom: 1px solid #333;
            display: flex;
            flex-direction: column;
            transition: max-height 0.3s ease-in-out;
            max-height: 500px; /* 開いている時の最大高さ */
            overflow: hidden;
        }
        
        /* メニューが畳まれたときの状態 */
        #header.collapsed {
            max-index: 60px; /* タイトルバーの高さだけ残す */
            max-height: 57px; 
        }

        /* タイトルと折りたたみボタンのバー */
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #2a2a2a;
        }
        .header-bar h2 {
            margin: 0;
            font-size: 18px;
        }
        
        /* 折りたたみトグルボタン */
        #menuToggle {
            background: #333;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        #menuToggle:hover {
            background: #444;
        }

        /* 横並びのイースターエッグリスト */
        .egg-list {
            list-style: none;
            padding: 10px;
            margin: 0;
            display: flex;
            flex-wrap: wrap; /* 入りきらない場合は折り返し */
            gap: 10px;
            overflow-y: auto;
            background: #161616;
        }
        .egg-item {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            cursor: pointer;
            background: #222;
            border: 1px solid #333;
            border-radius: 8px;
            transition: background 0.2s, transform 0.1s;
        }
        .egg-item:hover {
            background: #2a2a2a;
            transform: translateY(-2px);
        }
        .egg-item img {
            width: 24px;
            height: 24px;
            margin-right: 10px;
            object-fit: contain;
        }

        /* メイン画面（iframeコンテナ） */
        #main-content {
            flex-grow: 1;
            position: relative;
            background: #000;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .placeholder {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); /* タイポ修正しました！ */
            color: #666;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="header">
        <div class="header-bar">
            <h2>Android Eggs Portal</h2>
            <button id="menuToggle">メニューを閉じる ▲</button>
        </div>
        <ul class="egg-list" id="eggList">
            <!-- スクリプトによって自動的に追加されます -->
        </ul>
    </div>

    <div id="main-content">
        <div class="placeholder" id="placeholder">上部のメニューからイースターエッグを選択してください</div>
        <iframe id="eggViewer" style="display: none;"></iframe>
    </div>

    <script src="script.js"></script>
</body>
</html>
