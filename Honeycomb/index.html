
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Honeycomb</title>
    <style>
        :root {
            --bg-color: #000000;
        }
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        /* 画面中央に配置されるロゴ (ImageView.ScaleType.CENTER_INSIDE 相当) */
        #logo-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            padding: 10vw;
        }

        #platlogo {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            pointer-events: none;
        }

        /* AndroidのToast風ポップアップのスタイル */
        /* AndroidのToast（通知）をWebで再現 */
        #toast {
            position: fixed;
            bottom: 50px;
            background: rgba(50, 50, 50, 0.9);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            box-shadow: 0px 3px 6px rgba(0,0,0,0.3);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        #toast.show { opacity: 1; }
    </style>
</head>
<body>

    <div id="logo-container">
        <!-- ロゴ画像 (h_platlogo or h_platlogo_1) -->
        <img id="platlogo" src="h_platlogo.webp" alt="Honeycomb Logo" draggable="false">
    </div>

    <!-- Toast表示エリア -->
    <div id="toast">REZZZZZZZ...</div>

    <script>
        // --- 資源・アセットの定義 (ランダム選択の再現) ---
        // ※ 실제環境に合わせてファイルパスや拡張子(.webp / .png など)は適宜調整してください
        const LOGO_DEFAULT = 'h_platlogo.webp';
        const LOGO_ALT = 'h_platlogo_1.webp';

        const imgElement = document.getElementById('platlogo');
        const toastElement = document.getElementById('toast');

        // randomPlatlogo() の移植 (50%の確率で h_platlogo_1 を返す)
        function randomPlatlogo() {
            let r = Math.random();
            if (r >= 0.5) {
                return LOGO_ALT;
            }
            return LOGO_DEFAULT;
        }

        // onCreate の再現
        function initEgg() {
            let selectedLogo = randomPlatlogo();
            imgElement.src = selectedLogo;
        }

        // Toastのトグル・連続表示制御用タイマー
        let toastTimeout = null;

        function showToast(message) {
            toastElement.textContent = message;
            
            // すでに表示中のタイマーがあればクリア
            if (toastTimeout) {
                clearTimeout(toastTimeout);
                toastElement.classList.remove('show');
                // DOM再描画を挟んでアニメーションをリセット
                void toastElement.offsetWidth;
            }

            // 表示 (Toast.LENGTH_SHORT 相当の約2秒間表示)
            setTimeout(() => {
                toastElement.classList.add('show');
            }, 10);

            toastTimeout = setTimeout(() => {
                toastElement.classList.remove('show');
            }, 2000);
        }

        // dispatchTouchEvent の移植 (ACTION_UP でトースト表示)
        window.addEventListener('pointerup', (ev) => {
            showToast("REZZZZZZZ...");
        });

        // 初期化実行
        initEgg();
    </script>
</body>
</html>
